<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>会社の手取り最大化診断</title>
  <style>
    :root{
      --bg:#f7f7f4;
      --panel:#ffffff;
      --text:#171717;
      --sub:#6b7280;
      --line:#e5e7eb;
      --navy:#111827;
      --orange:#f28c28;
      --orange-dark:#d97706;
      --soft:#fff7ed;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}
    body{overflow-x:hidden}
    button,input{font:inherit}
    .app{
      min-height:100vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(247,247,244,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1100px;
      margin:auto;
      padding:16px 20px 10px;
    }
    .topline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }
    .brand{
      font-weight:800;
      letter-spacing:.01em;
    }
    .progress-text{
      color:var(--sub);
      font-size:14px;
      white-space:nowrap;
    }
    .progress{
      height:5px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin-top:12px;
    }
    .progress > div{
      height:100%;
      width:0;
      background:var(--orange);
      transition:width .25s ease;
    }
    .stage{
      display:grid;
      place-items:center;
      padding:32px 20px;
    }
    .card{
      width:min(860px,100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:42px;
      box-shadow:0 16px 50px rgba(0,0,0,.06);
      animation:fade .24s ease;
    }
    @keyframes fade{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:none}
    }
    .kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      color:var(--orange-dark);
      font-weight:800;
      margin-bottom:16px;
    }
    h1,h2{
      margin:0;
      line-height:1.35;
    }
    h1{font-size:clamp(32px,5vw,54px)}
    h2{font-size:clamp(26px,4vw,40px)}
    .lead{
      margin:18px 0 0;
      color:var(--sub);
      font-size:18px;
      line-height:1.8;
    }
    .answers{
      display:grid;
      gap:12px;
      margin-top:28px;
    }
    .answer{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:16px 18px;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      align-items:flex-start;
      gap:12px;
    }
    .answer:hover{
      border-color:var(--orange);
      background:var(--soft);
      transform:translateY(-1px);
    }
    .answer.selected{
      border-color:var(--orange);
      background:var(--soft);
      box-shadow:0 0 0 2px rgba(242,140,40,.12);
    }
    .key{
      flex:0 0 30px;
      width:30px;
      height:30px;
      display:grid;
      place-items:center;
      border-radius:8px;
      background:#f3f4f6;
      color:#374151;
      font-weight:800;
      font-size:13px;
    }
    .answer.selected .key{
      background:var(--orange);
      color:#fff;
    }
    .answer-main{
      font-weight:700;
      color:#1f2937;
      line-height:1.55;
    }
    .hint{
      margin-top:14px;
      color:var(--sub);
      font-size:13px;
    }
    .input{
      width:100%;
      margin-top:26px;
      border:none;
      border-bottom:2px solid #d1d5db;
      background:transparent;
      padding:14px 2px;
      font-size:24px;
      outline:none;
    }
    .input:focus{border-bottom-color:var(--orange)}
    .footer{
      border-top:1px solid var(--line);
      background:#fff;
    }
    .footer-inner{
      max-width:1100px;
      margin:auto;
      padding:14px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .nav-group{display:flex;gap:10px}
    .btn{
      border:0;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:800;
    }
    .btn-secondary{
      background:#f3f4f6;
      color:#374151;
    }
    .btn-primary{
      background:var(--orange);
      color:#fff;
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .start-actions{
      margin-top:28px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .micro{
      color:var(--sub);
      font-size:13px;
      margin-top:10px;
    }
    .result-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      margin-top:26px;
    }
    .result-box{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      background:#fafafa;
    }
    .result-box strong{
      display:block;
      margin-bottom:6px;
      color:var(--navy);
    }
    .summary{
      margin-top:26px;
      border-top:1px solid var(--line);
      padding-top:22px;
    }
    .summary-row{
      padding:14px 0;
      border-bottom:1px solid var(--line);
    }
    .summary-q{
      font-size:13px;
      color:var(--sub);
      margin-bottom:5px;
    }
    .summary-a{
      font-weight:700;
      color:#1f2937;
    }
    .complete-actions{
      margin-top:26px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    @media(max-width:700px){
      .stage{padding:20px 12px}
      .card{padding:28px 20px;border-radius:18px}
      .footer-inner{padding:12px}
      .result-grid{grid-template-columns:1fr}
      .brand{font-size:14px}
      .progress-text{font-size:12px}
      .btn{padding:11px 14px}
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topline">
        <div class="brand">会社の手取り最大化診断</div>
        <div class="progress-text" id="progressText">開始前</div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
    </div>
  </header>

  <main class="stage">
    <section class="card" id="card"></section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="micro" id="footerHint">約3〜5分で完了します</div>
      <div class="nav-group">
        <button class="btn btn-secondary" id="backBtn">戻る</button>
        <button class="btn btn-primary" id="nextBtn">次へ</button>
      </div>
    </div>
  </footer>
</div>

<script>
const questions = [
  {
    id:"q1",
    title:"現在の状況を教えてください",
    type:"single",
    options:[
      "法人を経営している",
      "個人事業主として活動している",
      "これから創業・法人化する予定",
      "会社員・副業として準備している"
    ]
  },
  {
    id:"q2",
    title:"今、最も気になっていることはどれですか？",
    type:"single",
    options:[
      "設備・システム・店舗などへ投資したい",
      "人を採用したい、育成したい",
      "資金を確保したい、資金繰りが不安",
      "国保・社保など毎月の負担が重い",
      "広告費を使っているが成果が見えない",
      "固定費や契約を全体的に見直したい",
      "利益は出ているのにお金が残らない",
      "何から確認すればよいかわからない"
    ]
  },
  {
    id:"q3",
    title:"今後1年以内に予定していることを選んでください",
    type:"multi",
    options:[
      "設備・機械を購入する",
      "ITツールやシステムを導入する",
      "ホームページやECサイトを作る",
      "店舗・事務所を改装する",
      "新商品・新サービスを始める",
      "新しい事業へ進出する",
      "人を採用する",
      "従業員を研修する",
      "賃上げ・正社員化を行う",
      "広告を増やす、集客を見直す",
      "融資を受けたい",
      "特に決まっていない"
    ]
  },
  {
    id:"q4",
    title:"その予定は、いつ頃実行しますか？",
    type:"single",
    options:["1か月以内","3か月以内","半年以内","1年以内","まだ決まっていない"]
  },
  {
    id:"q5",
    title:"予定している投資や支出の規模はどれくらいですか？",
    type:"single",
    options:["50万円未満","50万〜300万円","300万〜1,000万円","1,000万円以上","まだわからない"]
  },
  {
    id:"q6",
    title:"すでに購入・契約・発注しているものはありますか？",
    type:"single",
    options:["まだ何もしていない","見積もりを取っただけ","発注・契約済み","すでに支払い・購入済み"]
  },
  {
    id:"q7",
    title:"現在、従業員はいますか？",
    type:"single",
    options:["正社員がいる","パート・アルバイトがいる","業務委託だけ","従業員はいない"]
  },
  {
    id:"q8",
    title:"今後、人に関して予定していることはありますか？",
    type:"multi",
    options:[
      "新しく人を採用する",
      "非正規社員を正社員にする",
      "従業員の賃金を上げる",
      "研修・資格取得を行う",
      "育児・介護との両立支援を行う",
      "働き方や就業規則を見直す",
      "特に予定はない"
    ]
  },
  {
    id:"q9",
    title:"現在の資金状況に最も近いものはどれですか？",
    type:"single",
    options:[
      "半年以上の支払いに対応できる",
      "3か月程度なら対応できる",
      "1〜2か月後が不安",
      "すでに支払いが厳しい",
      "把握できていない"
    ]
  },
  {
    id:"q10",
    title:"現在加入している保険を教えてください",
    type:"single",
    options:[
      "国民健康保険・国民年金",
      "法人の社会保険",
      "家族の扶養に入っている",
      "よくわからない"
    ]
  },
  {
    id:"q11",
    title:"毎月の保険料負担をどの程度に感じていますか？",
    type:"single",
    options:["かなり重い","やや重い","適正か判断できない","特に気にならない"]
  },
  {
    id:"q12",
    title:"現在利用している集客方法を選んでください",
    type:"multi",
    options:[
      "Google・Yahoo広告",
      "SNS広告",
      "ポータルサイト・比較サイト",
      "チラシ・DM",
      "紹介・口コミ",
      "広告は使っていない"
    ]
  },
  {
    id:"q13",
    title:"広告から問い合わせ数や契約数を把握していますか？",
    type:"single",
    options:[
      "問い合わせ数も契約数も把握している",
      "問い合わせ数だけ把握している",
      "売上だけ見ている",
      "ほとんど把握していない"
    ]
  },
  {
    id:"q14",
    title:"見直したい費用を選んでください",
    type:"multi",
    options:[
      "通信費",
      "システム・サブスク",
      "保険料",
      "顧問料",
      "外注費",
      "決済手数料",
      "家賃・リース料",
      "何を見直せるかわからない"
    ]
  },
  {
    id:"q15",
    title:"その契約内容を最後に見直したのはいつですか？",
    type:"single",
    options:["半年以内","1年以内","2年以上見直していない","契約時から一度も見直していない","わからない"]
  },
  {
    id:"q16",
    title:"これまで確認や見直しを進められなかった理由は何ですか？",
    type:"multi",
    options:[
      "自分が対象かわからない",
      "制度や契約が複雑でわからない",
      "調べる時間がない",
      "失敗して費用だけかかるのが怖い",
      "誰に相談すればよいかわからない",
      "相談すると営業されそうで不安",
      "急ぎではないので後回しにしている",
      "税理士や担当者に任せている"
    ]
  },
  {
    id:"q17",
    title:"1年後、どのような状態になっていたいですか？",
    type:"multi",
    options:[
      "使える制度が整理されている",
      "毎月の支払いが適正になっている",
      "設備投資の資金を確保できている",
      "広告費の効果が数字で見えている",
      "資金繰りの不安が減っている",
      "必要なことをまとめて相談できている"
    ]
  },
  {
    id:"q18",
    title:"診断結果について、どの対応を希望しますか？",
    type:"single",
    options:[
      "すぐに専門家へ相談したい",
      "まず結果を見てから考えたい",
      "自分で確認できる資料がほしい",
      "今回は診断結果だけ見たい"
    ]
  }
];

let screen = "start";
let index = 0;
const answers = {};

const card = document.getElementById("card");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");
const footerHint = document.getElementById("footerHint");

function escapeHtml(text){
  return String(text).replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[s]));
}

function renderStart(){
  screen = "start";
  progressBar.style.width = "0%";
  progressText.textContent = "開始前";
  footerHint.textContent = "約3〜5分で完了します";
  backBtn.style.display = "none";
  nextBtn.style.display = "none";
  card.innerHTML = `
    <div class="kicker">無料診断</div>
    <h1>会社に残るお金を、<br>4つの視点から確認します。</h1>
    <p class="lead">補助金・助成金・融資・国保・社保・広告費・固定費などを横断して、今どこを優先して見直すべきかを整理します。</p>
    <div class="result-grid">
      <div class="result-box"><strong>受け取る</strong>補助金・助成金など</div>
      <div class="result-box"><strong>減らす</strong>保険料・広告費・固定費など</div>
      <div class="result-box"><strong>借りる・備える</strong>融資・資金繰りなど</div>
      <div class="result-box"><strong>残す</strong>利益・支出・お金の流れ</div>
    </div>
    <div class="start-actions">
      <button class="btn btn-primary" id="startBtn">診断を始める</button>
    </div>
    <div class="micro">回答内容に応じた分岐は、次の段階で追加できます。</div>
  `;
  document.getElementById("startBtn").onclick = () => {
    screen = "question";
    index = 0;
    renderQuestion();
  };
}

function renderQuestion(){
  screen = "question";
  const q = questions[index];
  const progress = ((index + 1) / questions.length) * 100;
  progressBar.style.width = progress + "%";
  progressText.textContent = `${index + 1} / ${questions.length}`;
  footerHint.textContent = q.type === "multi" ? "複数選択できます" : "1つ選んでください";
  backBtn.style.display = "inline-block";
  nextBtn.style.display = "inline-block";
  backBtn.disabled = false;
  nextBtn.disabled = !answers[q.id] || (Array.isArray(answers[q.id]) && answers[q.id].length === 0);
  nextBtn.textContent = index === questions.length - 1 ? "診断結果を見る" : "次へ";

  const selected = answers[q.id] || (q.type === "multi" ? [] : "");
  const optionHtml = q.options.map((opt,i)=>{
    const isSelected = q.type === "multi" ? selected.includes(opt) : selected === opt;
    return `
      <button class="answer ${isSelected ? "selected" : ""}" data-value="${escapeHtml(opt)}">
        <span class="key">${i+1}</span>
        <span class="answer-main">${escapeHtml(opt)}</span>
      </button>
    `;
  }).join("");

  card.innerHTML = `
    <div class="kicker">質問 ${index + 1}</div>
    <h2>${escapeHtml(q.title)}</h2>
    <div class="answers">${optionHtml}</div>
    <div class="hint">${q.type === "multi" ? "選び終わったら「次へ」を押してください。" : "選択後、自動で次へ進まず、内容を確認できます。"}</div>
  `;

  [...card.querySelectorAll(".answer")].forEach(btn=>{
    btn.onclick = ()=>{
      const value = btn.dataset.value;
      if(q.type === "multi"){
        const current = Array.isArray(answers[q.id]) ? [...answers[q.id]] : [];
        const pos = current.indexOf(value);
        if(pos >= 0) current.splice(pos,1);
        else current.push(value);
        answers[q.id] = current;
      } else {
        answers[q.id] = value;
      }
      renderQuestion();
    };
  });
}

function buildType(){
  const main = answers.q2 || "";
  if(main.includes("投資")) return ["制度活用不足タイプ","購入・契約前に補助金の可能性確認を優先"];
  if(main.includes("採用")) return ["人材制度活用タイプ","採用・研修・正社員化に関する助成制度を優先確認"];
  if(main.includes("資金")) return ["資金繰り準備タイプ","必要時期から逆算して融資と資金計画を確認"];
  if(main.includes("国保") || main.includes("社保")) return ["保険料確認タイプ","加入状況や報酬設計を個別に確認"];
  if(main.includes("広告")) return ["広告費見直しタイプ","削減前に問い合わせ・契約・利益の計測を確認"];
  if(main.includes("固定費")) return ["固定費見直しタイプ","長期未見直し・重複・未利用契約を確認"];
  return ["総合見直しタイプ","制度・資金・支出を横断して優先順位を整理"];
}

function renderResult(){
  screen = "result";
  progressBar.style.width = "100%";
  progressText.textContent = "診断完了";
  footerHint.textContent = "回答内容はこの端末内だけで保持されています";
  backBtn.style.display = "inline-block";
  nextBtn.style.display = "none";

  const [type, action] = buildType();
  const summary = questions.map(q=>{
    const a = answers[q.id];
    const text = Array.isArray(a) ? a.join("、") : (a || "未回答");
    return `
      <div class="summary-row">
        <div class="summary-q">${escapeHtml(q.title)}</div>
        <div class="summary-a">${escapeHtml(text)}</div>
      </div>
    `;
  }).join("");

  card.innerHTML = `
    <div class="kicker">診断結果</div>
    <h1>${escapeHtml(type)}</h1>
    <p class="lead">${escapeHtml(action)}。現時点では分岐ロジックを簡易化しており、次の段階で各回答に応じた詳細判定を追加できます。</p>

    <div class="result-grid">
      <div class="result-box">
        <strong>最優先</strong>
        ${escapeHtml(action)}
      </div>
      <div class="result-box">
        <strong>次に行うこと</strong>
        投資予定、支出一覧、資金状況を整理する
      </div>
      <div class="result-box">
        <strong>確認する視点</strong>
        受け取る・減らす・借りる・残す
      </div>
      <div class="result-box">
        <strong>相談時に使える情報</strong>
        この診断の回答内容をそのまま共有できる
      </div>
    </div>

    <div class="complete-actions">
      <button class="btn btn-primary" id="copyBtn">回答内容をコピー</button>
      <button class="btn btn-secondary" id="restartBtn">最初からやり直す</button>
    </div>

    <div class="summary">
      <h2>回答内容</h2>
      ${summary}
    </div>
  `;

  document.getElementById("restartBtn").onclick = ()=>{
    Object.keys(answers).forEach(k=>delete answers[k]);
    renderStart();
  };

  document.getElementById("copyBtn").onclick = async ()=>{
    const text = questions.map(q=>{
      const a = answers[q.id];
      return `${q.title}\n${Array.isArray(a) ? a.join("、") : (a || "未回答")}`;
    }).join("\n\n");
    try{
      await navigator.clipboard.writeText(text);
      document.getElementById("copyBtn").textContent = "コピーしました";
    }catch(e){
      alert("コピーできませんでした。");
    }
  };
}

backBtn.onclick = ()=>{
  if(screen === "question"){
    if(index === 0) renderStart();
    else{
      index--;
      renderQuestion();
    }
  }else if(screen === "result"){
    index = questions.length - 1;
    renderQuestion();
  }
};

nextBtn.onclick = ()=>{
  if(screen !== "question") return;
  const q = questions[index];
  const a = answers[q.id];
  if(!a || (Array.isArray(a) && a.length === 0)) return;
  if(index < questions.length - 1){
    index++;
    renderQuestion();
  }else{
    renderResult();
  }
};

document.addEventListener("keydown", e=>{
  if(screen !== "question") return;
  const q = questions[index];
  const n = Number(e.key);
  if(n >= 1 && n <= q.options.length){
    const value = q.options[n-1];
    if(q.type === "multi"){
      const current = Array.isArray(answers[q.id]) ? [...answers[q.id]] : [];
      const pos = current.indexOf(value);
      if(pos >= 0) current.splice(pos,1);
      else current.push(value);
      answers[q.id] = current;
    }else{
      answers[q.id] = value;
    }
    renderQuestion();
  }
  if(e.key === "Enter" && !nextBtn.disabled) nextBtn.click();
});

renderStart();
</script>
</body>
</html>
