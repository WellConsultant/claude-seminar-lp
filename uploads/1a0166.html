<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>会社の手取り最大化診断</title>
  <style>
    :root{
      --bg:#f7f7f4;
      --panel:#ffffff;
      --text:#171717;
      --sub:#6b7280;
      --line:#e5e7eb;
      --navy:#111827;
      --orange:#f28c28;
      --orange-dark:#d97706;
      --soft:#fff7ed;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}
    body{overflow-x:hidden}
    button,input{font:inherit}
    .app{
      min-height:100vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(247,247,244,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1100px;
      margin:auto;
      padding:16px 20px 10px;
    }
    .topline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }
    .brand{
      font-weight:800;
      letter-spacing:.01em;
    }
    .progress-text{
      color:var(--sub);
      font-size:14px;
      white-space:nowrap;
    }
    .progress{
      height:5px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin-top:12px;
    }
    .progress > div{
      height:100%;
      width:0;
      background:var(--orange);
      transition:width .25s ease;
    }
    .stage{
      display:grid;
      place-items:center;
      padding:24px 36px;
    }
    .card{
      width:min(1180px,100%);
      min-height:620px;
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:48px 56px;
      box-shadow:0 16px 50px rgba(0,0,0,.06);
      animation:fade .24s ease;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }
    @keyframes fade{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:none}
    }
    .kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      color:var(--orange-dark);
      font-weight:800;
      margin-bottom:16px;
    }
    h1,h2{
      margin:0;
      line-height:1.35;
    }
    h1{font-size:clamp(32px,5vw,54px)}
    h2{font-size:clamp(26px,4vw,40px)}
    .lead{
      margin:18px 0 0;
      color:var(--sub);
      font-size:18px;
      line-height:1.8;
    }
    .answers{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px 16px;
      margin-top:30px;
    }
    .answer{
      width:100%;
      min-height:78px;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:16px 18px;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      align-items:center;
      gap:12px;
    }
    .answer:hover{
      border-color:var(--orange);
      background:var(--soft);
      transform:translateY(-1px);
    }
    .answer.selected{
      border-color:var(--orange);
      background:var(--soft);
      box-shadow:0 0 0 2px rgba(242,140,40,.12);
    }
    .key{
      flex:0 0 30px;
      width:30px;
      height:30px;
      display:grid;
      place-items:center;
      border-radius:8px;
      background:#f3f4f6;
      color:#374151;
      font-weight:800;
      font-size:13px;
    }
    .answer.selected .key{
      background:var(--orange);
      color:#fff;
    }
    .answer-main{
      font-weight:700;
      color:#1f2937;
      line-height:1.55;
    }
    .question-desc{
      margin:16px 0 0;
      color:var(--sub);
      font-size:17px;
      line-height:1.9;
      max-width:980px;
    }
    .after-note{
      margin-top:18px;
      padding:15px 17px;
      border-radius:12px;
      background:var(--soft);
      border-left:4px solid var(--orange);
      color:#6b4423;
      font-size:14px;
      line-height:1.75;
    }
    .hint{
      margin-top:14px;
      color:var(--sub);
      font-size:13px;
    }
    .input{
      width:100%;
      margin-top:26px;
      border:none;
      border-bottom:2px solid #d1d5db;
      background:transparent;
      padding:14px 2px;
      font-size:24px;
      outline:none;
    }
    .input:focus{border-bottom-color:var(--orange)}
    .footer{
      border-top:1px solid var(--line);
      background:#fff;
    }
    .footer-inner{
      max-width:1100px;
      margin:auto;
      padding:14px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .nav-group{display:flex;gap:10px}
    .btn{
      border:0;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:800;
    }
    .btn-secondary{
      background:#f3f4f6;
      color:#374151;
    }
    .btn-primary{
      background:var(--orange);
      color:#fff;
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .start-actions{
      margin-top:28px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .micro{
      color:var(--sub);
      font-size:13px;
      margin-top:10px;
    }
    .result-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:14px;
      margin-top:28px;
    }
    .result-box{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      background:#fafafa;
    }
    .result-box strong{
      display:block;
      margin-bottom:6px;
      color:var(--navy);
    }
    .summary{
      margin-top:26px;
      border-top:1px solid var(--line);
      padding-top:22px;
    }
    .summary-row{
      padding:14px 0;
      border-bottom:1px solid var(--line);
    }
    .summary-q{
      font-size:13px;
      color:var(--sub);
      margin-bottom:5px;
    }
    .summary-a{
      font-weight:700;
      color:#1f2937;
    }
    .complete-actions{
      margin-top:26px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .report{margin-top:34px;border-top:3px solid var(--orange);padding-top:30px}
    .report-hero{background:linear-gradient(135deg,#111827,#111);color:#fff;border-radius:20px;padding:32px;margin-bottom:20px}
    .report-hero h2{font-size:clamp(28px,4vw,42px);margin:0 0 12px}
    .report-hero p{color:#e5e7eb;margin:0}
    .report-section{border:1px solid var(--line);border-radius:16px;padding:22px;margin-top:16px;background:#fff}
    .report-section h3{margin:0 0 12px;font-size:22px}
    .report-section p{color:var(--sub);line-height:1.85}
    .report-list{margin:10px 0 0;padding-left:1.25em}
    .report-list li{margin:7px 0}
    .priority-grid,.score-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-top:14px}
    .priority-card,.score-box{border:1px solid var(--line);border-radius:14px;padding:16px;background:#fafafa}
    .priority-card strong,.score-box strong{display:block;margin-bottom:7px;color:var(--navy)}
    .score-value{font-size:28px;font-weight:900;color:var(--orange-dark)}
    .contact-frame{margin-top:18px;padding:18px;background:#f8fafc;border:1px solid var(--line);border-radius:16px}
    .report-gate{
      margin-top:26px;
      border:2px solid var(--orange);
      background:linear-gradient(180deg,#fffaf4,#fff);
      border-radius:22px;
      padding:30px;
      box-shadow:0 16px 40px rgba(242,140,40,.12);
    }
    .report-gate-badge{
      display:inline-block;
      background:var(--orange);
      color:#fff;
      font-size:13px;
      font-weight:900;
      padding:6px 12px;
      border-radius:999px;
      margin-bottom:14px;
    }
    .report-gate h2{
      margin:0 0 12px;
      font-size:clamp(28px,4vw,42px);
      line-height:1.4;
    }
    .report-gate .gate-lead{
      margin:0 0 20px;
      color:#4b5563;
      font-size:17px;
      line-height:1.9;
    }
    .gate-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
      margin:18px 0 22px;
    }
    .gate-item{
      border:1px solid #fed7aa;
      background:#fff;
      border-radius:14px;
      padding:15px;
      font-weight:700;
      color:#374151;
    }
    .gate-note{
      margin:16px 0 0;
      color:#6b7280;
      font-size:13px;
      text-align:center;
    }
    .preview-lock{
      margin-top:18px;
      border:1px dashed #fdba74;
      border-radius:16px;
      padding:18px;
      background:#fffdf9;
    }
    .preview-lock strong{
      display:block;
      margin-bottom:8px;
      color:#9a3412;
    }
    .scroll-cta{
      margin-top:22px;
      display:inline-block;
      border:0;
      border-radius:12px;
      padding:14px 22px;
      background:var(--orange);
      color:#fff;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
    }
    @media(max-width:900px){
      .stage{padding:20px 16px}
      .card{
        min-height:auto;
        padding:34px 28px;
      }
      .answers{grid-template-columns:1fr}
      .result-grid{grid-template-columns:1fr 1fr}
    }
    @media(max-width:700px){
      .stage{padding:16px 10px}
      .card{padding:28px 20px;border-radius:18px}
      .footer-inner{padding:12px}
      .result-grid{grid-template-columns:1fr}
      .priority-grid,.score-grid,.gate-grid{grid-template-columns:1fr}
      .brand{font-size:14px}
      .progress-text{font-size:12px}
      .btn{padding:11px 14px}
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topline">
        <div class="brand">会社の手取り最大化診断</div>
        <div class="progress-text" id="progressText">開始前</div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
    </div>
  </header>

  <main class="stage">
    <section class="card" id="card"></section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="micro" id="footerHint">約3〜5分で完了します</div>
      <div class="nav-group">
        <button class="btn btn-secondary" id="backBtn">戻る</button>
        <button class="btn btn-primary" id="nextBtn">次へ</button>
      </div>
    </div>
  </footer>
</div>

<script>
const questions = [
  {
    id:"q1",
    title:"まず、現在の立場を教えてください",
    description:"法人か個人事業主かによって、役員報酬、社会保険、補助金・助成金、融資など、確認すべき内容が大きく変わります。",
    type:"single",
    options:["法人を経営している","個人事業主として活動している","これから創業・法人化する予定","会社員・副業として準備している"],
    after:"現在の立場に合わせて、あなたに関係する可能性だけを絞り込んでいきます。"
  },
  {
    id:"q2",
    title:"今、一番増やしたいものはどれですか？",
    description:"制度名ではなく、最終的にどのような変化を得たいかを教えてください。",
    type:"single",
    options:[
      "毎月、自分の手元に残るお金を増やしたい",
      "会社に残るお金を増やしたい",
      "設備・システムへの自己負担を減らしたい",
      "採用・研修・賃上げの負担を減らしたい",
      "資金を確保して安心して投資したい",
      "保険料や固定費を見直したい",
      "広告費を利益につなげたい",
      "何ができるのか全部確認したい"
    ],
    after:"手取りを増やす方法は、給与を増やすことだけではありません。受け取り方・会社負担・制度活用まで含めて確認します。"
  },
  {
    id:"q3",
    title:"あなたは会社から、どのような形でお金を受け取っていますか？",
    description:"Excelのシミュレーションでは、役員報酬だけでなく、非課税または実費精算となり得る受け取り方、会社負担へ移せる支出も含めて比較しています。",
    type:"multi",
    options:[
      "役員報酬・給与",
      "通勤手当",
      "出張旅費・日当",
      "会社負担の家賃・社宅",
      "会社へ貸したお金の返済",
      "会社へ売却した資産の代金",
      "配当・その他の受け取り",
      "役員報酬・給与だけ"
    ],
    after:"同じ総額でも、受け取り方によって個人の手取りと会社負担のバランスが変わることがあります。"
  },
  {
    id:"q4",
    title:"現在の月額役員報酬・給与に近いものを選んでください",
    description:"正確な金額でなくて大丈夫です。社会保険料、所得税、住民税とのバランスを見るための目安として使います。",
    type:"single",
    options:["30万円未満","30万〜50万円","50万〜80万円","80万〜100万円","100万円以上","役員報酬・給与はない"],
    after:"役員報酬を下げればよいという話ではありません。会社負担、個人の生活費、将来の保障を含めて比較する必要があります。"
  },
  {
    id:"q5",
    title:"現在の保険料や税金の負担について、近いものを選んでください",
    description:"国保・社保、所得税、住民税が適正かどうかは、収入だけでなく家族構成や事業形態でも変わります。",
    type:"multi",
    options:[
      "社会保険料が高いと感じる",
      "国民健康保険料が高いと感じる",
      "所得税・住民税が高いと感じる",
      "毎月いくら引かれているか把握していない",
      "適正かどうか判断できない",
      "特に気にならない"
    ],
    after:"負担額だけではなく、保障、将来の年金、法人側の負担まで含めて確認します。"
  },
  {
    id:"q6",
    title:"扶養家族や介護保険の状況を教えてください",
    description:"税金・社会保険の試算に関係するため、当てはまるものを選んでください。",
    type:"multi",
    options:[
      "配偶者を扶養している",
      "子ども・親族を扶養している",
      "40歳以上65歳未満で介護保険第2号被保険者に該当する",
      "扶養家族はいない",
      "よくわからない"
    ],
    after:"家族構成も含めて見ることで、単純な年収比較では見えない負担差を確認できます。"
  },
  {
    id:"q7",
    title:"年間の出張はどのくらいありますか？",
    description:"Excelでは、日帰り・遠方・宿泊出張の日数をもとに、出張旅費や日当を試算しています。実態のある出張が対象です。",
    type:"single",
    options:["ほとんどない","年間1〜5日","年間6〜20日","年間21〜50日","年間51日以上","日数を把握していない"],
    after:"出張がある場合、旅費規程や精算方法を整えることで、実費や日当を適正に処理できる可能性があります。"
  },
  {
    id:"q8",
    title:"会社で旅費規程を整備していますか？",
    description:"出張旅費や日当は、実態、規程、金額の妥当性、記録が重要です。",
    type:"single",
    options:["規程があり運用している","規程はあるが運用できていない","規程がない","わからない","出張がない"],
    after:"規程を作るだけでは足りません。実際の出張記録と一貫した運用まで確認します。"
  },
  {
    id:"q9",
    title:"自宅や家賃について、当てはまるものはありますか？",
    description:"Excelでは、借り上げ社宅による会社負担と自己負担の比較も行っています。適正家賃の計算や契約関係の確認が必要です。",
    type:"multi",
    options:[
      "賃貸住宅に住んでいる",
      "会社名義で借りられる可能性がある",
      "すでに借り上げ社宅を利用している",
      "持ち家に住んでいる",
      "会社への不動産売却・賃貸を検討したい",
      "特に該当しない"
    ],
    after:"社宅は単純に家賃を会社払いにする制度ではありません。契約、適正な自己負担、税務上の要件を確認します。"
  },
  {
    id:"q10",
    title:"会社へ貸しているお金や、会社があなたへ返すべきお金はありますか？",
    description:"役員借入金がある場合、返済は給与とは異なるお金の動きです。Excelでは返済期間ごとの年間返済額を試算しています。",
    type:"single",
    options:["役員借入金がある","過去に立替えた経費がある","あるかもしれないが把握していない","ない","わからない"],
    after:"帳簿上の残高、実際の貸付事実、返済計画が一致しているかを確認する必要があります。"
  },
  {
    id:"q11",
    title:"生命保険料は、現在どのように支払っていますか？",
    description:"Excelでは、個人負担している生命保険料を法人契約へ移した場合の個人支出と法人負担を比較しています。",
    type:"single",
    options:["個人で支払っている","法人で支払っている","個人と法人の両方","保険に加入していない","契約内容がわからない"],
    after:"法人契約が必ず有利とは限りません。保障目的、解約返戻金、損金算入、受取人などを含めて比較します。"
  },
  {
    id:"q12",
    title:"小規模企業共済やその他の所得控除を利用していますか？",
    description:"手取りは、受取額だけでなく所得控除によっても変わります。",
    type:"multi",
    options:[
      "小規模企業共済",
      "生命保険料控除",
      "地震保険料控除",
      "扶養控除",
      "その他の所得控除",
      "利用していない",
      "把握していない"
    ],
    after:"使える控除を確認しつつ、資金拘束や将来の受け取り方も含めて判断します。"
  },
  {
    id:"q13",
    title:"今後1年以内に予定している投資を選んでください",
    description:"補助金は会社情報だけではなく、これから何をするかによって対象可能性が変わります。複数選択できます。",
    type:"multi",
    options:[
      "機械・設備の購入",
      "ITツール・業務システムの導入",
      "ホームページ・ECサイトの制作",
      "店舗・事務所の改装",
      "新商品・新サービスの開発",
      "新事業への進出",
      "省力化・省エネ設備の導入",
      "広告・販路開拓",
      "特に予定はない"
    ],
    after:"投資予定が具体的であるほど、補助制度、融資、自己資金の組み合わせを検討しやすくなります。"
  },
  {
    id:"q14",
    title:"その投資の実施時期はいつ頃ですか？",
    description:"補助金は購入・契約・発注前の申請や交付決定が必要な場合があります。",
    type:"single",
    options:["1か月以内","3か月以内","半年以内","1年以内","まだ決まっていない","投資予定はない"],
    after:"時期が近い場合は、制度名を探す前に契約・発注を止めて確認すべきことがあります。"
  },
  {
    id:"q15",
    title:"投資予定額に近いものを選んでください",
    description:"制度の規模、自己資金、融資の必要性を判断する目安です。",
    type:"single",
    options:["50万円未満","50万〜300万円","300万〜1,000万円","1,000万〜5,000万円","5,000万円以上","まだわからない","投資予定はない"],
    after:"補助金は後払いが多いため、投資額が大きいほど先に資金計画が必要です。"
  },
  {
    id:"q16",
    title:"すでに購入・契約・発注していますか？",
    description:"補助金の可否を左右する重要な質問です。",
    type:"single",
    options:["まだ何もしていない","見積もりだけ取得した","申込み・契約・発注済み","支払い・納品済み","投資予定はない"],

function escapeHtml(text){
  return String(text).replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[s]));
}

function renderQuestion(){
  screen = "question";
  const q = questions[index];
  const progress = ((index + 1) / questions.length) * 100;
  progressBar.style.width = progress + "%";
  progressText.textContent = `${index + 1} / ${questions.length}`;
  footerHint.textContent = q.type === "multi" ? "複数選択できます" : "1つ選んでください";
  backBtn.style.display = "inline-block";
  nextBtn.style.display = "inline-block";
  backBtn.disabled = false;
  nextBtn.disabled = !answers[q.id] || (Array.isArray(answers[q.id]) && answers[q.id].length === 0);
  nextBtn.textContent = index === questions.length - 1 ? "診断結果を見る" : "次へ";

  const selected = answers[q.id] || (q.type === "multi" ? [] : "");
  const optionHtml = q.options.map((opt,i)=>{
    const isSelected = q.type === "multi" ? selected.includes(opt) : selected === opt;
    return `
      <button class="answer ${isSelected ? "selected" : ""}" data-value="${escapeHtml(opt)}">
        <span class="key">${i+1}</span>
        <span class="answer-main">${escapeHtml(opt)}</span>
      </button>
    `;
  }).join("");

  card.innerHTML = `
    <div class="kicker">質問 ${index + 1} / ${questions.length}</div>
    <h2>${escapeHtml(q.title)}</h2>
    <p class="question-desc">${escapeHtml(q.description || "")}</p>
    <div class="answers">${optionHtml}</div>
    ${answers[q.id] ? `<div class="after-note">${escapeHtml(q.after || "")}</div>` : ""}
    <div class="hint">${q.type === "multi" ? "複数選択できます。選び終わったら「次へ」を押してください。" : "今の状況に一番近いものを1つ選んでください。"}</div>
  `;

  [...card.querySelectorAll(".answer")].forEach(btn=>{
    btn.onclick = ()=>{
      const value = btn.dataset.value;
      if(q.type === "multi"){
        const current = Array.isArray(answers[q.id]) ? [...answers[q.id]] : [];
        const pos = current.indexOf(value);
        if(pos >= 0) current.splice(pos,1);
        else current.push(value);
        answers[q.id] = current;
      } else {
        answers[q.id] = value;
      }
      renderQuestion();
    };
  });
}

        <strong>あなたに関係する可能性だけ</strong>をまとめたレポートを受け取れます。
      </p>

      <div class="gate-grid">
        <div class="gate-item">あなたに関係する手取り改善策</div>
        <div class="gate-item">補助金・助成金・融資の確認項目</div>
        <div class="gate-item">役員報酬・社保・旅費・社宅の見直し候補</div>
        <div class="gate-item">優先順位と7日・30日・90日の行動計画</div>
      </div>

      <div class="contact-frame">
        <iframe
          id="traingo-embed"
          src="https://traingo.fp-1.info/f/100-27-xdjn?embed=1"
          width="100%"
          frameborder="0"
          scrolling="no"
          style="border:0;background:transparent;max-width:560px;display:block;margin:0 auto;height:600px;min-height:600px"
        ></iframe>
      </div>

      <p class="gate-note">
        入力いただいた内容は、レポート送付と診断結果のご案内に使用します。
      </p>
    </section>
  `;
}

function renderResult(){
  screen = "result";
  progressBar.style.width = "100%";
  progressText.textContent = "診断完了";
  footerHint.textContent = "回答内容はこの端末内だけで保持されています";
  backBtn.style.display = "inline-block";
  nextBtn.style.display = "none";

  const result = buildType();
  const summary = questions.map(q=>{
    const a = answers[q.id];
    const text = Array.isArray(a) ? a.join("、") : (a || "未回答");
    return `
      <div class="summary-row">
        <div class="summary-q">${escapeHtml(q.title)}</div>
        <div class="summary-a">${escapeHtml(text)}</div>
      </div>
    `;
  }).join("");

  card.innerHTML = `
    <div class="kicker">あなたの診断結果</div>
    <h1>${escapeHtml(result.headline)}</h1>
    <p class="lead">${escapeHtml(result.intro)}</p>

    <div class="result-grid">
      <div class="result-box">
        <strong>今回見つかった可能性</strong>
        ${escapeHtml(result.found)}
      </div>
      <div class="result-box">
        <strong>今すぐ確認したいこと</strong>
        ${escapeHtml(result.first)}
      </div>
      <div class="result-box">
        <strong>受け取る・備えるお金</strong>
        ${escapeHtml(result.money)}
      </div>
      <div class="result-box">
        <strong>毎月見直せる可能性</strong>
        ${escapeHtml(result.cost)}
      </div>
    </div>

    <div class="after-note" style="margin-top:24px">
      今回の回答では、あなたに関係する可能性として、制度活用、資金準備、毎月の支払い、広告費、固定費など、複数の見直し候補が見つかっています。全部を一度に進める必要はありません。あなたの場合は、金額が大きいもの、期限が近いもの、実行前に確認が必要なものから順番に整理します。
    </div>

    <div class="result-box" style="margin-top:16px;background:#fff7ed;border-color:#fdba74">
      <strong>おめでとうございます。手取りを増やせる可能性が見つかりました。</strong>
      あなたが選んだ「今後の予定」「支出の状況」「資金の不安」「見直したい項目」をもとに、あなたに関係する内容だけをまとめた専用レポートを作成します。関係のない制度や一般論を並べるのではなく、今のあなたにとって、どこにお金が残る可能性があるのか、何から確認すべきか、どの順番で動けばよいかを整理して表示します。
    </div>

    <div class="complete-actions">
      <button class="btn btn-primary" id="reportBtn">無料レポートを受け取る</button>
      <button class="btn btn-secondary" id="restartBtn">最初からやり直す</button>
    </div>

    ${buildPersonalReport()}
    ${buildReportGate()}

    <div class="summary">
      <h2>回答内容</h2>
      ${summary}
    </div>
  `;

  document.getElementById("restartBtn").onclick = ()=>{
    Object.keys(answers).forEach(k=>delete answers[k]);
    renderStart();
  };

  document.getElementById("reportBtn").onclick = ()=>{
    const target = document.getElementById("report-form");
    if(target) target.scrollIntoView({behavior:"smooth", block:"start"});
  };
}

backBtn.onclick = ()=>{
  if(screen === "question"){
    if(index === 0) renderStart();
    else{
      index--;
      renderQuestion();
    }
  }else if(screen === "result"){
    index = questions.length - 1;
    renderQuestion();
  }
};

nextBtn.onclick = ()=>{
  if(screen !== "question") return;
  const q = questions[index];
  const a = answers[q.id];
  if(!a || (Array.isArray(a) && a.length === 0)) return;
  if(index < questions.length - 1){
    index++;
    renderQuestion();
  }else{
    renderResult();
  }
};

document.addEventListener("keydown", e=>{
  if(screen !== "question") return;
  const q = questions[index];
  const n = Number(e.key);
  if(n >= 1 && n <= q.options.length){
    const value = q.options[n-1];
    if(q.type === "multi"){
      const current = Array.isArray(answers[q.id]) ? [...answers[q.id]] : [];
      const pos = current.indexOf(value);
      if(pos >= 0) current.splice(pos,1);
      else current.push(value);
      answers[q.id] = current;
    }else{
      answers[q.id] = value;
    }
    renderQuestion();
  }
  if(e.key === "Enter" && !nextBtn.disabled) nextBtn.click();
});


window.addEventListener("message", function (e) {
  if (e.origin !== "https://traingo.fp-1.info") return;
  if (e.data && e.data.type === "traingo:resize" && e.data.height) {
    var el = document.getElementById("traingo-embed");
    if (!el) return;
    el.style.height = e.data.height + "px";
    el.style.minHeight = "0";
  }
});

renderStart();
</script>
</body>
</html>
