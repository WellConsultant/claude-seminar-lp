<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>会社の手取り最大化診断</title>
  <style>
    :root{
      --bg:#f7f7f4;
      --panel:#ffffff;
      --text:#171717;
      --sub:#6b7280;
      --line:#e5e7eb;
      --navy:#111827;
      --orange:#f28c28;
      --orange-dark:#d97706;
      --soft:#fff7ed;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:var(--bg);color:var(--text)}
    body{overflow-x:hidden}
    button,input{font:inherit}
    .app{
      min-height:100vh;
      display:grid;
      grid-template-rows:auto 1fr auto;
    }
    .topbar{
      position:sticky;
      top:0;
      z-index:10;
      background:rgba(247,247,244,.94);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1100px;
      margin:auto;
      padding:16px 20px 10px;
    }
    .topline{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:16px;
    }
    .brand{
      font-weight:800;
      letter-spacing:.01em;
    }
    .progress-text{
      color:var(--sub);
      font-size:14px;
      white-space:nowrap;
    }
    .progress{
      height:5px;
      background:#e5e7eb;
      border-radius:999px;
      overflow:hidden;
      margin-top:12px;
    }
    .progress > div{
      height:100%;
      width:0;
      background:var(--orange);
      transition:width .25s ease;
    }
    .stage{
      display:grid;
      place-items:center;
      padding:32px 20px;
    }
    .card{
      width:min(860px,100%);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:24px;
      padding:42px;
      box-shadow:0 16px 50px rgba(0,0,0,.06);
      animation:fade .24s ease;
    }
    @keyframes fade{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:none}
    }
    .kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      font-size:14px;
      color:var(--orange-dark);
      font-weight:800;
      margin-bottom:16px;
    }
    h1,h2{
      margin:0;
      line-height:1.35;
    }
    h1{font-size:clamp(32px,5vw,54px)}
    h2{font-size:clamp(26px,4vw,40px)}
    .lead{
      margin:18px 0 0;
      color:var(--sub);
      font-size:18px;
      line-height:1.8;
    }
    .answers{
      display:grid;
      gap:12px;
      margin-top:28px;
    }
    .answer{
      width:100%;
      text-align:left;
      border:1px solid var(--line);
      background:#fff;
      border-radius:14px;
      padding:16px 18px;
      cursor:pointer;
      transition:.18s ease;
      display:flex;
      align-items:flex-start;
      gap:12px;
    }
    .answer:hover{
      border-color:var(--orange);
      background:var(--soft);
      transform:translateY(-1px);
    }
    .answer.selected{
      border-color:var(--orange);
      background:var(--soft);
      box-shadow:0 0 0 2px rgba(242,140,40,.12);
    }
    .key{
      flex:0 0 30px;
      width:30px;
      height:30px;
      display:grid;
      place-items:center;
      border-radius:8px;
      background:#f3f4f6;
      color:#374151;
      font-weight:800;
      font-size:13px;
    }
    .answer.selected .key{
      background:var(--orange);
      color:#fff;
    }
    .answer-main{
      font-weight:700;
      color:#1f2937;
      line-height:1.55;
    }
    .question-desc{
      margin:16px 0 0;
      color:var(--sub);
      font-size:16px;
      line-height:1.9;
      max-width:760px;
    }
    .after-note{
      margin-top:18px;
      padding:15px 17px;
      border-radius:12px;
      background:var(--soft);
      border-left:4px solid var(--orange);
      color:#6b4423;
      font-size:14px;
      line-height:1.75;
    }
    .hint{
      margin-top:14px;
      color:var(--sub);
      font-size:13px;
    }
    .input{
      width:100%;
      margin-top:26px;
      border:none;
      border-bottom:2px solid #d1d5db;
      background:transparent;
      padding:14px 2px;
      font-size:24px;
      outline:none;
    }
    .input:focus{border-bottom-color:var(--orange)}
    .footer{
      border-top:1px solid var(--line);
      background:#fff;
    }
    .footer-inner{
      max-width:1100px;
      margin:auto;
      padding:14px 20px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
    }
    .nav-group{display:flex;gap:10px}
    .btn{
      border:0;
      border-radius:12px;
      padding:12px 18px;
      cursor:pointer;
      font-weight:800;
    }
    .btn-secondary{
      background:#f3f4f6;
      color:#374151;
    }
    .btn-primary{
      background:var(--orange);
      color:#fff;
    }
    .btn:disabled{
      opacity:.45;
      cursor:not-allowed;
    }
    .start-actions{
      margin-top:28px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    .micro{
      color:var(--sub);
      font-size:13px;
      margin-top:10px;
    }
    .result-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:14px;
      margin-top:26px;
    }
    .result-box{
      border:1px solid var(--line);
      border-radius:16px;
      padding:18px;
      background:#fafafa;
    }
    .result-box strong{
      display:block;
      margin-bottom:6px;
      color:var(--navy);
    }
    .summary{
      margin-top:26px;
      border-top:1px solid var(--line);
      padding-top:22px;
    }
    .summary-row{
      padding:14px 0;
      border-bottom:1px solid var(--line);
    }
    .summary-q{
      font-size:13px;
      color:var(--sub);
      margin-bottom:5px;
    }
    .summary-a{
      font-weight:700;
      color:#1f2937;
    }
    .complete-actions{
      margin-top:26px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }
    @media(max-width:700px){
      .stage{padding:20px 12px}
      .card{padding:28px 20px;border-radius:18px}
      .footer-inner{padding:12px}
      .result-grid{grid-template-columns:1fr}
      .brand{font-size:14px}
      .progress-text{font-size:12px}
      .btn{padding:11px 14px}
    }
  </style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topline">
        <div class="brand">会社の手取り最大化診断</div>
        <div class="progress-text" id="progressText">開始前</div>
      </div>
      <div class="progress"><div id="progressBar"></div></div>
    </div>
  </header>

  <main class="stage">
    <section class="card" id="card"></section>
  </main>

  <footer class="footer">
    <div class="footer-inner">
      <div class="micro" id="footerHint">約3〜5分で完了します</div>
      <div class="nav-group">
        <button class="btn btn-secondary" id="backBtn">戻る</button>
        <button class="btn btn-primary" id="nextBtn">次へ</button>
      </div>
    </div>
  </footer>
</div>

<script>
const questions = [
  {
    id:"q1",
    title:"まず、現在の立場を教えてください",
    description:"同じ悩みでも、法人か個人事業主か、これから始める段階かによって、確認すべき制度や支払いは変わります。ここでは、今の状況に一番近いものを選んでください。",
    type:"single",
    options:[
      "法人を経営している",

      "これから創業・法人化する予定",

    type:"single",
    options:[

      "何から確認すればよいかわからない"
    ],
    after:"今感じている悩みは、ひとつの制度だけで解決するとは限りません。ここから少しずつ原因を分けていきます。"
  },
  {
    id:"q3",
    title:"今後1年以内に、やりたいことはありますか？",
    description:"補助金や助成金は、現在の会社情報だけでなく、これから何をする予定なのかによって使える可能性が変わります。まだ確定していない予定も含めて選んでください。",
    type:"multi",
    options:[
      "設備・機械を購入する",
      "ITツールやシステムを導入する",
      "ホームページやECサイトを作る",
      "店舗・事務所を改装する",
      "新商品・新サービスを始める",
      "新しい事業へ進出する",
      "人を採用する",
      "従業員を研修する",
      "賃上げ・正社員化を行う",
      "広告を増やす、集客を見直す",
      "融資を受けたい",
      "特に決まっていない"
    ],
    after:"予定があること自体が、制度活用の入口になる場合があります。実行前に確認できるかどうかが重要です。"
  },
  {
    id:"q4",
    title:"その予定は、いつ頃実行しそうですか？",
    description:"制度によっては、購入・契約・採用・研修を始める前に手続きが必要です。時期が近いほど、早めの確認が重要になります。",
    type:"single",
    options:["1か月以内","3か月以内","半年以内","1年以内","まだ決まっていない"],
    after:"時期が近い場合は、制度探しより先に「何をする前に確認すべきか」を整理する必要があります。"
  },
  {
    id:"q5",
    title:"予定している投資や支出の規模はどれくらいですか？",
    description:"正確な金額でなくて大丈夫です。規模がわかると、確認すべき制度や、準備すべき資金の優先順位が見えやすくなります。",
    type:"single",
    options:["50万円未満","50万〜300万円","300万〜1,000万円","1,000万円以上","まだわからない"],
    after:"金額が大きいほど、補助金だけでなく融資や自己資金との組み合わせも重要になります。"
  },
  {
    id:"q6",
    title:"すでに購入・契約・発注しているものはありますか？",
    description:"ここは重要な確認です。制度によっては、先に契約や支払いをすると対象にならない場合があります。現状に一番近いものを選んでください。",
    type:"single",
    options:["まだ何もしていない","見積もりを取っただけ","発注・契約済み","すでに支払い・購入済み"],

  {

    options:["正社員がいる","パート・アルバイトがいる","業務委託だけ","従業員はいない"],

    id:"q8",
    title:"これから、人に関して予定していることはありますか？",

    type:"multi",
    options:[
      "新しく人を採用する",
      "非正規社員を正社員にする",

      "研修・資格取得を行う",

  },
  {
    id:"q9",
    title:"今の資金状況に、一番近いものはどれですか？",
    description:"融資は、支払いが厳しくなってからではなく、余裕があるうちに準備したほうが選択肢を持ちやすくなります。感覚的な回答で大丈夫です。",
    type:"single",
    options:[
      "半年以上の支払いに対応できる",

      "すでに支払いが厳しい",
      "把握できていない"
    ],
    after:"資金状況を把握できているだけでも、今後の判断は変わります。必要であれば、資金繰りを見える化することから始めます。"
  },
  {
    id:"q10",
    title:"現在加入している保険を教えてください",
    description:"国保・社保の負担は、事業形態、役員報酬、家族構成、雇用状況などによって変わります。削減を断定するのではなく、まず現在地を確認します。",
    type:"single",
    options:[
      "国民健康保険・国民年金",
      "法人の社会保険",
      "家族の扶養に入っている",
      "よくわからない"
    ],
    after:"加入状況が適正かどうかは、金額だけでは判断できません。現在の形態と今後の予定を含めて確認する必要があります。"
  },
  {
    id:"q11",
    title:"毎月の保険料負担を、どう感じていますか？",
    description:"実際に高いか安いかだけでなく、負担感や内容を理解できているかも大切です。今の感覚に近いものを選んでください。",
    type:"single",
    options:["かなり重い","やや重い","適正か判断できない","特に気にならない"],
    after:"負担が重い場合も、すぐに変更するのではなく、保障や将来の影響を含めて比較することが大切です。"
  },
  {
    id:"q12",
    title:"現在、どのような方法で集客していますか？",
    description:"広告費を減らすことが正解とは限りません。どこから問い合わせが来ているかを整理すると、残す広告と見直す広告が見えてきます。",
    type:"multi",
    options:[
      "Google・Yahoo広告",
      "SNS広告",
      "ポータルサイト・比較サイト",
      "チラシ・DM",
      "紹介・口コミ",
      "広告は使っていない"

    after:"集客方法が複数ある場合、費用ではなく「どこから利益が出ているか」で判断する必要があります。"
  },
  {
    id:"q13",
    title:"広告からの問い合わせ数や契約数を把握していますか？",

    type:"single",
    options:[
      "問い合わせ数も契約数も把握している",

  {
    id:"q14",
    title:"今、見直したいと感じている費用はありますか？",

let screen = "start";
let index = 0;
const answers = {};

const card = document.getElementById("card");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const backBtn = document.getElementById("backBtn");
const nextBtn = document.getElementById("nextBtn");
const footerHint = document.getElementById("footerHint");

function escapeHtml(text){
  return String(text).replace(/[&<>"']/g, s => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
  }[s]));
}

function renderStart(){
  screen = "start";
  progressBar.style.width = "0%";
  progressText.textContent = "開始前";
  footerHint.textContent = "約3〜5分で完了します";
  backBtn.style.display = "none";
  nextBtn.style.display = "none";
  card.innerHTML = `
    <div class="kicker">無料・約3〜5分</div>
    <h1>頑張って売上を増やす前に、<br>今よりお金が残る方法がないか確認しませんか？</h1>
    <p class="lead">会社のお金が残らない原因は、売上不足だけとは限りません。受け取れる制度を見落としていたり、毎月の支払いがそのままになっていたり、必要な資金準備が後回しになっていることもあります。この診断では、今の状況を一緒に整理しながら、最初に確認すべきポイントを見つけます。</p>
    <div class="result-grid">
      <div class="result-box"><strong>受け取れるお金</strong>補助金・助成金など、今後の予定から使える可能性を確認します。</div>
      <div class="result-box"><strong>減らせる支払い</strong>保険料・広告費・固定費など、長く見直していない支出を整理します。</div>
      <div class="result-box"><strong>先に備える資金</strong>融資・資金繰り・つなぎ資金など、困る前に準備すべきことを確認します。</div>
      <div class="result-box"><strong>最後に残るお金</strong>利益が出ても残らない原因や、お金の流れの見落としを整理します。</div>
    </div>
    <div class="start-actions">
      <button class="btn btn-primary" id="startBtn">診断を始める</button>
    </div>
    <div class="micro">正確な金額がわからなくても大丈夫です。今の感覚に一番近いものを選んでください。</div>
  `;
  document.getElementById("startBtn").onclick = () => {
    screen = "question";
    index = 0;
    renderQuestion();
  };
}

function renderQuestion(){
  screen = "question";
  const q = questions[index];
  const progress = ((index + 1) / questions.length) * 100;
  progressBar.style.width = progress + "%";
  progressText.textContent = `${index + 1} / ${questions.length}`;
  footerHint.textContent = q.type === "multi" ? "複数選択できます" : "1つ選んでください";
  backBtn.style.display = "inline-block";
  nextBtn.style.display = "inline-block";
  backBtn.disabled = false;
  nextBtn.disabled = !answers[q.id] || (Array.isArray(answers[q.id]) && answers[q.id].length === 0);
  nextBtn.textContent = index === questions.length - 1 ? "診断結果を見る" : "次へ";

  const selected = answers[q.id] || (q.type === "multi" ? [] : "");
  const optionHtml = q.options.map((opt,i)=>{
    const isSelected = q.type === "multi" ? selected.includes(opt) : selected === opt;
    return `
      <button class="answer ${isSelected ? "selected" : ""}" data-value="${escapeHtml(opt)}">
        <span class="key">${i+1}</span>
        <span class="answer-main">${escapeHtml(opt)}</span>
      </button>
    `;
  }).join("");

  card.innerHTML = `
    <div class="kicker">質問 ${index + 1} / ${questions.length}</div>
    <h2>${escapeHtml(q.title)}</h2>
    <p class="question-desc">${escapeHtml(q.description || "")}</p>
    <div class="answers">${optionHtml}</div>
    ${answers[q.id] ? `<div class="after-note">${escapeHtml(q.after || "")}</div>` : ""}
    <div class="hint">${q.type === "multi" ? "複数選択できます。選び終わったら「次へ」を押してください。" : "今の状況に一番近いものを1つ選んでください。"}</div>
  `;

  [...card.querySelectorAll(".answer")].forEach(btn=>{
    btn.onclick = ()=>{
      const value = btn.dataset.value;
      if(q.type === "multi"){
        const current = Array.isArray(answers[q.id]) ? [...answers[q.id]] : [];
        const pos = current.indexOf(value);
        if(pos >= 0) current.splice(pos,1);
        else current.push(value);
        answers[q.id] = current;
      } else {
        answers[q.id] = value;
      }
      renderQuestion();
    };
  });
}

function buildType(){
  const main = answers.q2 || "";
  if(main.includes("投資")) return [
    "まだ使える選択肢を整理できる段階です",
    "設備やシステムへの投資を考えている今は、購入・契約前に制度を確認する価値があります。",
    "まずは投資内容、予定時期、見積金額を整理し、補助金と融資を一緒に確認することが優先です。"
  ];
  if(main.includes("採用")) return [
    "人にかかる費用を、支出だけで終わらせない準備が必要です",
    "採用・研修・賃上げ・正社員化は、実施前に確認することで使える制度が見つかる場合があります。",
    "人に関する予定を時系列で整理し、実施前の手続きが必要か確認することが優先です。"
  ];
  if(main.includes("資金")) return [
    "困る前に資金の選択肢を持っておきたい状態です",
    "資金繰りは、厳しくなってから動くより、余裕があるうちに準備したほうが選択肢を残しやすくなります。",
    "必要時期、必要額、使い道を整理し、融資・自己資金・補助金の組み合わせを考えることが優先です。"
  ];
  if(main.includes("国保") || main.includes("社保")) return [
    "毎月の負担を、仕組みから確認する価値があります",
    "保険料は金額だけでなく、事業形態、報酬、家族構成、保障とのバランスで考える必要があります。",
    "現在の加入状況と今後の働き方を整理し、変更による不利益も含めて専門家へ確認することが優先です。"
  ];
  if(main.includes("広告")) return [
    "広告費を減らす前に、利益につながる流れを見える化したい状態です",
    "問い合わせ数や契約数が見えていない場合、広告を止めても本当の原因は解決しません。",
    "広告ごとの問い合わせ、契約、利益を整理し、残す広告と見直す広告を分けることが優先です。"
  ];
  if(main.includes("固定費")) return [
    "毎月の支払いに、確認できていないものが残っている可能性があります",
    "長く見直していない契約や、使っていない機能、似たサービスの重複は、年間で大きな負担になることがあります。",
    "まず契約一覧を作り、必要・不要・不明の3つに分けることが優先です。"
  ];
  return [
    "ひとつずつ探すより、全体を整理したほうが早い状態です",
    "制度、資金、保険料、広告費、固定費が複数関係している可能性があります。",
    "最初に全体の支出と今後の予定を並べ、金額と期限から優先順位を決めることが必要です。"
  ];
}

function renderResult(){
  screen = "result";
  progressBar.style.width = "100%";
  progressText.textContent = "診断完了";
  footerHint.textContent = "回答内容はこの端末内だけで保持されています";
  backBtn.style.display = "inline-block";
  nextBtn.style.display = "none";

  const [type, insight, action] = buildType();
  const summary = questions.map(q=>{
    const a = answers[q.id];
    const text = Array.isArray(a) ? a.join("、") : (a || "未回答");
    return `
      <div class="summary-row">
        <div class="summary-q">${escapeHtml(q.title)}</div>
        <div class="summary-a">${escapeHtml(text)}</div>
      </div>
    `;
  }).join("");

  card.innerHTML = `
    <div class="kicker">診断が完了しました</div>
    <h1>${escapeHtml(type)}</h1>
    <p class="lead">${escapeHtml(insight)}</p>

    <div class="result-grid">
      <div class="result-box">
        <strong>最初に取り組みたいこと</strong>
        ${escapeHtml(action)}
      </div>
      <div class="result-box">
        <strong>今すぐ全部やる必要はありません</strong>
        金額が大きいもの、期限が近いもの、実行前に確認が必要なものから順番に進めれば大丈夫です。
      </div>
      <div class="result-box">
        <strong>見落としやすい視点</strong>
        補助金だけでなく、助成金、融資、保険料、広告費、固定費を一緒に見ることで、別の改善策が見つかることがあります。
      </div>
      <div class="result-box">
        <strong>この診断の使い方</strong>
        回答内容をそのまま専門家へ共有すれば、ゼロから説明せずに相談を始められます。
      </div>
    </div>

    <div class="complete-actions">
      <button class="btn btn-primary" id="copyBtn">回答内容をコピー</button>
      <button class="btn btn-secondary" id="restartBtn">最初からやり直す</button>
    </div>

    <div class="summary">
      <h2>回答内容</h2>
      ${summary}
    </div>
  `;

  document.getElementById("restartBtn").onclick = ()=>{
    Object.keys(answers).forEach(k=>delete answers[k]);
    renderStart();
  };

  document.getElementById("copyBtn").onclick = async ()=>{
    const text = questions.map(q=>{
      const a = answers[q.id];
      return `${q.title}\n${Array.isArray(a) ? a.join("、") : (a || "未回答")}`;
    }).join("\n\n");
    try{
      await navigator.clipboard.writeText(text);
      document.getElementById("copyBtn").textContent = "コピーしました";
    }catch(e){
      alert("コピーできませんでした。");
    }
  };
}

backBtn.onclick = ()=>{
  if(screen === "question"){
    if(index === 0) renderStart();
    else{
      index--;
      renderQuestion();
    }
  }else if(screen === "result"){
    index = questions.length - 1;
    renderQuestion();
  }
};

nextBtn.onclick = ()=>{
  if(screen !== "question") return;
  const q = questions[index];
  const a = answers[q.id];
  if(!a || (Array.isArray(a) && a.length === 0)) return;
  if(index < questions.length - 1){
    index++;
    renderQuestion();
  }else{
    renderResult();
  }
};

document.addEventListener("keydown", e=>{
  if(screen !== "question") return;
  const q = questions[index];
  const n = Number(e.key);
  if(n >= 1 && n <= q.options.length){
    const value = q.options[n-1];
    if(q.type === "multi"){
      const current = Array.isArray(answers[q.id]) ? [...answers[q.id]] : [];
      const pos = current.indexOf(value);
      if(pos >= 0) current.splice(pos,1);
      else current.push(value);
      answers[q.id] = current;
    }else{
      answers[q.id] = value;
    }
    renderQuestion();
  }
  if(e.key === "Enter" && !nextBtn.disabled) nextBtn.click();
});

renderStart();
</script>
</body>
</html>
