<script>

<style>
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:#f6f6f6;color:#111;font-family:"Noto Sans JP",-apple-system,BlinkMacSystemFont,"Hiragino Sans",sans-serif;font-weight:500;line-height:1.95;-webkit-font-smoothing:antialiased}
.wrap{max-width:720px;margin:0 auto;padding:0 24px}
.bar{background:linear-gradient(90deg,#0a1e38 0%,#1a4680 50%,#0a1e38 100%);color:#fff;padding:22px 20px;text-align:center;border-top:3px solid #ffd700;border-bottom:3px solid #ffd700}
.bar .barlabel{font-size:15px;font-weight:900;letter-spacing:.08em}
.hero{background:linear-gradient(180deg,#f4f7fc 0%,#fff 60%,#fff 100%);padding:80px 20px 60px;text-align:center;border-bottom:5px solid #0f2d52}
.brand-line{font-size:15px;color:#0f2d52;font-weight:900;letter-spacing:.18em;margin-bottom:18px}
.hero h1{font-size:38px;font-weight:900;line-height:1.5;color:#111;margin:0 0 20px;letter-spacing:-.01em}
.hero .lead{font-size:18px;color:#333;line-height:1.95;font-weight:500;margin:0 auto;max-width:560px}
.section{padding:60px 20px}
.card{background:#fff;border-radius:10px;padding:40px 36px;box-shadow:0 6px 20px rgba(0,0,0,0.08)}
.card h2{font-size:24px;font-weight:900;color:#0f2d52;margin:0 0 18px;line-height:1.55}
.card p{font-size:16px;line-height:1.95;color:#222;margin:0 0 14px}
.cta{display:block;width:100%;max-width:420px;margin:24px auto 0;background:linear-gradient(180deg,#0f2d52 0%,#0a1e38 100%);color:#fff;font-weight:900;font-size:18px;padding:20px 24px;text-decoration:none;border-radius:999px;text-align:center;letter-spacing:.05em;box-shadow:0 8px 20px rgba(15,45,82,0.25);transition:transform .15s,box-shadow .15s}
.cta:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(15,45,82,0.35)}
.next-note{font-size:14px;color:#666;text-align:center;margin-top:16px;line-height:1.85}
footer{background:#111;color:#ccc;padding:32px 20px;text-align:center;font-size:12px;line-height:1.9}
footer a{color:#ccc;text-decoration:none}
footer .copy{margin-top:10px;color:#999}
@media(max-width:720px){
  .hero{padding:48px 16px 40px}
  .hero h1{font-size:26px}
  .hero .lead{font-size:15px}
  .card{padding:28px 20px}
  .card h2{font-size:19px}
  .card p{font-size:14px}
  .cta{font-size:16px;padding:18px 18px}
